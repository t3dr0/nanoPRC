name: tag-policy

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Tag Format
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Validating tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "ERROR: Release tags must match vMAJOR.MINOR.PATCH (example: v1.2.3)."
            exit 1
          fi

          echo "Tag format is valid."
