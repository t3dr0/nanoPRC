name: python-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure zlib source is present
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d thirdparty/zlib ]; then
            git clone --depth 1 https://github.com/madler/zlib.git thirdparty/zlib
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *-musllinux* *-win32 *_i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ENVIRONMENT: "CMAKE_ARGS='-DNANOPRC_BUILD_DEMOS=OFF -DNANOPRC_BUILD_TESTS=OFF -DNANOPRC_BUILD_SDL=OFF'"
          CIBW_TEST_COMMAND: "python -c \"import nanoprc_py; import nanoprc_py._core as c; print(c.__file__)\""
          CIBW_BUILD_VERBOSITY: "1"
        with:
          package-dir: python
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure zlib source is present
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d thirdparty/zlib ]; then
            git clone --depth 1 https://github.com/madler/zlib.git thirdparty/zlib
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build --sdist python --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-sdist
          path: dist/*.tar.gz

  publish_testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: python-sdist
          path: dist

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: python-sdist
          path: dist

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
