name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure thirdparty dependencies are present
        shell: bash
        run: |
          set -euo pipefail
          [ -d thirdparty/zlib ] || git clone --depth 1 https://github.com/madler/zlib.git thirdparty/zlib
          [ -d thirdparty/SDL ] || git clone --depth 1 https://github.com/libsdl-org/SDL.git thirdparty/SDL
          [ -d thirdparty/imgui ] || git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui
          [ -d thirdparty/MatrixUtil ] || git clone --depth 1 https://github.com/evrhel/MatrixUtil.git thirdparty/MatrixUtil
          ls -la thirdparty

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxfixes-dev libxinerama-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libegl1-mesa-dev

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make

  macOS:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure thirdparty dependencies are present
        shell: bash
        run: |
          set -euo pipefail
          [ -d thirdparty/zlib ] || git clone --depth 1 https://github.com/madler/zlib.git thirdparty/zlib
          [ -d thirdparty/SDL ] || git clone --depth 1 https://github.com/libsdl-org/SDL.git thirdparty/SDL
          [ -d thirdparty/imgui ] || git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui
          [ -d thirdparty/MatrixUtil ] || git clone --depth 1 https://github.com/evrhel/MatrixUtil.git thirdparty/MatrixUtil
          ls -la thirdparty

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make

  Windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure thirdparty dependencies are present
        shell: bash
        run: |
          set -euo pipefail
          [ -d thirdparty/zlib ] || git clone --depth 1 https://github.com/madler/zlib.git thirdparty/zlib
          [ -d thirdparty/SDL ] || git clone --depth 1 https://github.com/libsdl-org/SDL.git thirdparty/SDL
          [ -d thirdparty/imgui ] || git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui
          [ -d thirdparty/MatrixUtil ] || git clone --depth 1 https://github.com/evrhel/MatrixUtil.git thirdparty/MatrixUtil
          ls -la thirdparty

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release
