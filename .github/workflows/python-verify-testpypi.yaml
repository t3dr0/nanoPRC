name: python-verify-testpypi

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to verify (e.g. 0.1.0). Leave blank for latest from TestPyPI."
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify TestPyPI (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package from TestPyPI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          PKG="nanoprc-py"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            PKG="nanoprc-py==${{ github.event.inputs.version }}"
          fi
          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple "$PKG"

      - name: Verify import and basic API
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import nanoprc_py
          import nanoprc_py._core as core

          print("nanoprc_py module:", nanoprc_py.__file__)
          print("nanoprc_py._core:", core.__file__)

          ctx = nanoprc_py.Context()
          print("Context created:", type(ctx).__name__)
          PY
